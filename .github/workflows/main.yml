name: Telegram Media Downloader Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyrogram tgcrypto psutil pyleaves asyncio python-dotenv
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Yeh step aapki config.env file create karega GitHub runner ke andar
    - name: Create config.env File
      run: |
        echo "API_ID=${{ secrets.API_ID }}" >> config.env
        echo "API_HASH=${{ secrets.API_HASH }}" >> config.env
        echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> config.env
        echo "SESSION_STRING=${{ secrets.SESSION_STRING }}" >> config.env

    - name: Run Telegram Bot
      run: |
        python main.py
