name: Telegram Media Downloader Bot

on:
  push:
    branches:
      - main
  workflow_dispatch: # Isse aap GitHub UI se manually run kar sakte hain

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Dependencies caching ke liye

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Agar aapki dependencies requirements.txt mein hain:
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Agar requirements.txt nahi hai, toh core libraries install karein:
        pip install pyrogram tgcrypto psutil pyleaves asyncio

    - name: Run Telegram Bot
      env:
        # Yeh aapki config.py file ke variables ke names ke mutabik hone chahiye
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        SESSION_STRING: ${{ secrets.SESSION_STRING }}
      run: |
        python main.py
        
