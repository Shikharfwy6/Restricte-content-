name: Telegram Media Downloader Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # config.env ko read karne ke liye python-dotenv zaroori hai
        pip install pyrogram tgcrypto psutil pyleaves asyncio python-dotenv
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Telegram Bot
      run: |
        python main.py
